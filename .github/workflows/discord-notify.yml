name: Discord Notifications (reusable)

on:
  workflow_call:
    secrets:
      DISCORD_WEBHOOK_URL:
        required: true

jobs:
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send push notification to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          HEAD_COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          COMMIT_MSG=$(echo "$HEAD_COMMIT_MESSAGE" | head -1 | cut -c1-100)
          AUTHOR="$HEAD_COMMIT_AUTHOR"
          REPO="${{ github.repository }}"

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 Push to main\",
                \"url\": \"${COMMIT_URL}\",
                \"color\": 3066993,
                \"fields\": [
                  {
                    \"name\": \"Commit\",
                    \"value\": \"[\`${SHORT_SHA}\`](${COMMIT_URL})\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Author\",
                    \"value\": \"${AUTHOR}\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Repository\",
                    \"value\": \"${REPO}\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Message\",
                    \"value\": \"${COMMIT_MSG}\",
                    \"inline\": false
                  }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

  notify-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Send PR notification to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"
          CHANGED_FILES="${{ github.event.pull_request.changed_files }}"
          ADDITIONS="${{ github.event.pull_request.additions }}"
          DELETIONS="${{ github.event.pull_request.deletions }}"
          DESCRIPTION=$(printf '%s' '${{ github.event.pull_request.body }}' | head -c 150 | tr -d '\r' | tr '\n' ' ' | sed 's/\\/\\\\/g; s/"/\\"/g')

          # Determine label and color
          if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            LABEL="merged"
            COLOR=3066993
          elif [ "$ACTION" = "closed" ]; then
            LABEL="closed"
            COLOR=15158332
          elif [ "$ACTION" = "synchronize" ]; then
            LABEL="updated"
            COLOR=16776960
          else
            LABEL="$ACTION"
            COLOR=16776960
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔀 PR #${PR_NUMBER} ${LABEL}\",
                \"url\": \"${PR_URL}\",
                \"color\": ${COLOR},
                \"fields\": [
                  {
                    \"name\": \"Title\",
                    \"value\": \"${PR_TITLE}\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"Author\",
                    \"value\": \"${AUTHOR}\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Branch\",
                    \"value\": \"\`${HEAD_BRANCH}\` → \`${BASE_BRANCH}\`\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Repository\",
                    \"value\": \"${{ github.repository }}\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Changes\",
                    \"value\": \"${CHANGED_FILES} files  |  +${ADDITIONS} −${DELETIONS}\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"Description\",
                    \"value\": \"${DESCRIPTION:-_No description provided_}\",
                    \"inline\": false
                  }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
