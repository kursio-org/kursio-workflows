name: Discord Notifications (reusable)

on:
  workflow_call:
    secrets:
      DISCORD_WEBHOOK_URL:
        required: true

jobs:
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send push notification to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          HEAD_COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"
          COMMIT_MSG=$(printf '%s' "$HEAD_COMMIT_MESSAGE" | head -1 | cut -c1-100)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          PAYLOAD=$(jq -n \
            --arg url "$COMMIT_URL" \
            --arg short_sha "$SHORT_SHA" \
            --arg author "$HEAD_COMMIT_AUTHOR" \
            --arg repo "$REPO" \
            --arg msg "$COMMIT_MSG" \
            --arg ts "$TIMESTAMP" \
            '{
              embeds: [{
                title: "🚀 Push to main",
                url: $url,
                color: 3066993,
                fields: [
                  { name: "Commit", value: "[`\($short_sha)`](\($url))", inline: true },
                  { name: "Author", value: $author, inline: true },
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Message", value: $msg, inline: false }
                ],
                timestamp: $ts
              }]
            }')

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  notify-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Send PR notification to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          ADDITIONS: ${{ github.event.pull_request.additions }}
          DELETIONS: ${{ github.event.pull_request.deletions }}
          REPO: ${{ github.repository }}
        run: |
          DESCRIPTION=$(printf '%s' "$PR_BODY" | tr -d '\r' | tr '\n' ' ' | head -c 150)
          if [ -z "$DESCRIPTION" ]; then
            DESCRIPTION="_No description provided_"
          fi

          if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            LABEL="merged"
            COLOR=3066993
          elif [ "$ACTION" = "closed" ]; then
            LABEL="closed"
            COLOR=15158332
          elif [ "$ACTION" = "synchronize" ]; then
            LABEL="updated"
            COLOR=16776960
          else
            LABEL="$ACTION"
            COLOR=16776960
          fi

          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CHANGES="${CHANGED_FILES} files  |  +${ADDITIONS} −${DELETIONS}"

          PAYLOAD=$(jq -n \
            --arg title "🔀 PR #${PR_NUMBER} ${LABEL}" \
            --arg url "$PR_URL" \
            --argjson color "$COLOR" \
            --arg pr_title "$PR_TITLE" \
            --arg author "$AUTHOR" \
            --arg head "$HEAD_BRANCH" \
            --arg base "$BASE_BRANCH" \
            --arg repo "$REPO" \
            --arg changes "$CHANGES" \
            --arg description "$DESCRIPTION" \
            --arg ts "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                fields: [
                  { name: "Title", value: $pr_title, inline: false },
                  { name: "Author", value: $author, inline: true },
                  { name: "Branch", value: "`\($head)` → `\($base)`", inline: true },
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Changes", value: $changes, inline: false },
                  { name: "Description", value: $description, inline: false }
                ],
                timestamp: $ts
              }]
            }')

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
